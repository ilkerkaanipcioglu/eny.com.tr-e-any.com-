<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eny — Intro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --lime:       #D0FD17;
    --lime-glow:  rgba(208,253,23,0.55);
    --lime-soft:  rgba(208,253,23,0.12);
    --gold:       #D4AF37;
    --trans:      all 0.5s cubic-bezier(0.22,1,0.36,1);
  }

  [data-theme="dark"] {
    --bg:           #050806;
    --bg2:          #0A0F0D;
    --surface:      #111A13;
    --border:       rgba(42,61,46,0.8);
    --word-base:    #111a13;
    --word-on:      #2a3d2e;
    --word-glow:    #D0FD17;
    --logo-color:   #ffffff;
    --logo-sub:     #3a5c3e;
    --domain-color: #D0FD17;
    --tagline:      #3a5c3e;
    --corner:       rgba(208,253,23,0.45);
    --particle-a:   0.55;
    --particle-b:   0.25;
    --line-c:       rgba(42,61,46,0.45);
    --scan-c:       rgba(208,253,23,0.5);
    --btn-c:        #2a3d2e;
    --btn-h:        #D0FD17;
    --theme-icon:   "☀";
  }

  [data-theme="light"] {
    --bg:           #f4f7f0;
    --bg2:          #edf2e8;
    --surface:      #ffffff;
    --border:       rgba(160,190,140,0.6);
    --word-base:    #d0ddc8;
    --word-on:      #8aab78;
    --word-glow:    #3a6b28;
    --logo-color:   #0e1f0b;
    --logo-sub:     #6b9a56;
    --domain-color: #2a6018;
    --tagline:      #7aaa60;
    --corner:       rgba(42,100,25,0.5);
    --particle-a:   0.35;
    --particle-b:   0.15;
    --line-c:       rgba(120,170,90,0.3);
    --scan-c:       rgba(80,160,40,0.4);
    --btn-c:        #8aab78;
    --btn-h:        #2a6018;
    --theme-icon:   "☽";
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    transition: background 0.6s;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  #stage {
    width: 100vw;
    height: 100vh;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  canvas#bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    transition: opacity 0.6s;
  }

  #vignette {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 1;
  }

  [data-theme="dark"] #vignette {
    background: radial-gradient(ellipse at center, transparent 25%, rgba(5,8,6,0.85) 100%);
  }
  [data-theme="light"] #vignette {
    background: radial-gradient(ellipse at center, transparent 25%, rgba(240,245,236,0.7) 100%);
  }

  #grid-overlay {
    position: absolute;
    inset: 0;
    z-index: 0;
    opacity: 0;
    transition: opacity 1s;
    pointer-events: none;
  }
  [data-theme="dark"] #grid-overlay {
    background-image:
      linear-gradient(rgba(208,253,23,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(208,253,23,0.03) 1px, transparent 1px);
    background-size: 52px 52px;
  }
  [data-theme="light"] #grid-overlay {
    background-image:
      linear-gradient(rgba(80,140,50,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(80,140,50,0.06) 1px, transparent 1px);
    background-size: 52px 52px;
  }
  #grid-overlay.on { opacity: 1; }

  #scan {
    position: absolute;
    left: 0; right: 0;
    height: 1px;
    z-index: 2;
    top: 0;
    pointer-events: none;
    opacity: 0;
  }
  [data-theme="dark"] #scan {
    background: linear-gradient(90deg, transparent, rgba(208,253,23,0.6), transparent);
  }
  [data-theme="light"] #scan {
    background: linear-gradient(90deg, transparent, rgba(60,140,30,0.5), transparent);
  }

  #content {
    position: relative;
    z-index: 3;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
  }

  #stream-area {
    width: 100%;
    max-width: 720px;
    min-height: 160px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    gap: 8px 14px;
    padding: 0 40px;
    margin-bottom: 52px;
  }

  .sw {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 400;
    color: var(--word-base);
    letter-spacing: 0.04em;
    opacity: 0;
    transform: translateY(4px);
    transition: color 0.4s, opacity 0.35s, transform 0.35s, text-shadow 0.4s;
    white-space: nowrap;
  }
  .sw.on {
    opacity: 1;
    transform: translateY(0);
    color: var(--word-on);
  }
  .sw.glow {
    color: var(--word-glow);
    text-shadow: 0 0 10px var(--lime-glow), 0 0 24px var(--lime-soft);
  }
  [data-theme="light"] .sw.glow {
    text-shadow: 0 0 8px rgba(42,96,24,0.4);
  }
  .sw.dim {
    opacity: 1;
    color: var(--word-on);
    text-shadow: none;
  }
  .sw.highlight {
    font-weight: 600;
    font-size: 13px;
  }

  #logo-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    opacity: 0;
    transform: translateY(14px) scale(0.94);
    transition: opacity 0.9s cubic-bezier(0.22,1,0.36,1),
                transform 0.9s cubic-bezier(0.22,1,0.36,1);
  }
  #logo-block.show {
    opacity: 1;
    transform: translateY(0) scale(1);
  }

  #rule-top, #rule-bot {
    height: 1px;
    width: 0;
    background: var(--domain-color);
    opacity: 0.5;
    transition: width 0.9s cubic-bezier(0.22,1,0.36,1);
  }

  #logo-text {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(72px, 12vw, 108px);
    color: var(--logo-color);
    letter-spacing: -0.05em;
    line-height: 1;
    transition: color 0.6s;
  }

  #logo-dot {
    color: var(--lime);
    display: inline-block;
  }
  [data-theme="light"] #logo-dot { color: #3a7a20; }

  #domains {
    display: flex;
    gap: 20px;
    align-items: center;
    opacity: 0;
    transform: translateY(5px);
    transition: opacity 0.7s, transform 0.7s;
  }
  #domains.show { opacity: 1; transform: translateY(0); }

  .dom {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--domain-color);
    transition: color 0.6s;
  }
  .dom-dot {
    width: 3px; height: 3px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.6s;
  }

  #tagline {
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--tagline);
    opacity: 0;
    transition: opacity 0.8s, color 0.6s;
    margin-top: 2px;
  }
  #tagline.show { opacity: 1; }

  .corner {
    position: absolute;
    width: 20px; height: 20px;
    opacity: 0;
    z-index: 3;
    transition: opacity 0.6s, border-color 0.6s;
    border-color: var(--corner);
    border-style: solid;
  }
  #c-tl { top: 22px; left: 22px; border-width: 1px 0 0 1px; }
  #c-tr { top: 22px; right: 22px; border-width: 1px 1px 0 0; }
  #c-bl { bottom: 22px; left: 22px; border-width: 0 0 1px 1px; }
  #c-br { bottom: 22px; right: 22px; border-width: 0 1px 1px 0; }
  .corner.show { opacity: 1; }

  #theme-btn {
    position: absolute;
    top: 22px; right: 64px;
    z-index: 10;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--btn-c);
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 10px;
    cursor: pointer;
    letter-spacing: 0.06em;
    transition: color 0.3s, border-color 0.3s, background 0.3s;
    opacity: 0;
  }
  #theme-btn.show { opacity: 1; transition: opacity 0.6s, color 0.3s, border-color 0.3s; }
  #theme-btn:hover { color: var(--btn-h); border-color: var(--btn-h); }

  #replay-btn {
    position: absolute;
    bottom: 22px; right: 64px;
    z-index: 10;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--btn-c);
    background: none;
    border: none;
    cursor: pointer;
    letter-spacing: 0.08em;
    opacity: 0;
    transition: opacity 0.6s, color 0.3s;
  }
  #replay-btn.show { opacity: 1; }
  #replay-btn:hover { color: var(--btn-h); }

  #status-bar {
    position: absolute;
    bottom: 22px; left: 40px;
    z-index: 10;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--word-on);
    letter-spacing: 0.06em;
    opacity: 0;
    transition: opacity 0.6s, color 0.6s;
  }
  #status-bar.show { opacity: 1; }

  @media (max-width: 480px) {
    #stream-area { gap: 6px 10px; padding: 0 24px; font-size: 11px; }
    .sw { font-size: 11px; }
    #logo-text { font-size: 64px; }
  }
</style>
</head>
<body>
<div id="stage">
  <canvas id="bg"></canvas>
  <div id="grid-overlay"></div>
  <div id="vignette"></div>
  <div id="scan"></div>

  <div class="corner" id="c-tl"></div>
  <div class="corner" id="c-tr"></div>
  <div class="corner" id="c-bl"></div>
  <div class="corner" id="c-br"></div>

  <button id="theme-btn" onclick="toggleTheme()">◐ tema</button>
  <button id="replay-btn" onclick="startIntro()">↺ tekrar</button>

  <div id="status-bar">GİB ONAYLI &nbsp;·&nbsp; PCI-DSS &nbsp;·&nbsp; ISO 27001</div>

  <div id="content">
    <div id="stream-area"></div>
    <div id="logo-block">
      <div id="rule-top"></div>
      <div id="logo-text">eny<span id="logo-dot">.</span></div>
      <div id="rule-bot"></div>
      <div id="domains">
        <span class="dom">eny.com.tr</span>
        <span class="dom-dot"></span>
        <span class="dom">e-any.com</span>
      </div>
      <div id="tagline">The Future of Financial Intelligence</div>
    </div>
  </div>
</div>

<script>
const WORDS = [
  'e-fatura','e-dönüşüm','e-arşiv','e-defter',
  'e-imza','e-irsaliye','e-ödeme','e-tahsilat',
  'e-dbs','e-ekstre','e-ticaret','e-devlet',
  'e-checkout','e-mutabakat','e-sözleşme','e-tebligat',
  'e-bilet','e-analitik','e-anything','e-everything',
  'e-something','e-blabla','e-any.com','ENY.COM.TR'
];

const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
let W, H, particles = [], rafId, tids = [];

function getTheme() { return document.documentElement.getAttribute('data-theme'); }

function toggleTheme() {
  const t = getTheme() === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', t);
  const btn = document.getElementById('theme-btn');
  btn.textContent = t === 'dark' ? '◐ tema' : '◑ tema';
  initParticles();
}

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

function mkParticle() {
  return {
    x: Math.random() * W,
    y: Math.random() * H,
    vx: (Math.random() - 0.5) * 0.28,
    vy: (Math.random() - 0.5) * 0.28,
    r: Math.random() * 1.3 + 0.3,
    a: Math.random() * 0.5 + 0.1,
    lime: Math.random() < 0.14,
    pulse: Math.random() * Math.PI * 2
  };
}

function initParticles() {
  particles = [];
  for (let i = 0; i < 130; i++) particles.push(mkParticle());
}

function drawBg(t) {
  ctx.clearRect(0, 0, W, H);
  const dark = getTheme() === 'dark';
  ctx.fillStyle = dark ? '#050806' : '#f4f7f0';
  ctx.fillRect(0, 0, W, H);

  const limeColor = dark
    ? (a) => `rgba(208,253,23,${a})`
    : (a) => `rgba(60,130,30,${a})`;
  const neutralColor = dark
    ? (a) => `rgba(60,90,65,${a})`
    : (a) => `rgba(120,170,90,${a})`;
  const lineColor = dark
    ? (a) => `rgba(42,61,46,${a})`
    : (a) => `rgba(120,170,90,${a})`;

  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.pulse += 0.02;
    if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
    if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
    const pulse = 0.7 + Math.sin(p.pulse) * 0.3;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * pulse, 0, Math.PI * 2);
    ctx.fillStyle = p.lime
      ? limeColor(p.a * pulse * (dark ? 1 : 0.6))
      : neutralColor(p.a * 0.5 * pulse * (dark ? 1 : 0.7));
    ctx.fill();
  }

  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d < 90) {
        const alpha = (1 - d / 90) * (dark ? 0.4 : 0.3);
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = lineColor(alpha);
        ctx.lineWidth = 0.4;
        ctx.stroke();
      }
    }
  }
  rafId = requestAnimationFrame(drawBg);
}

function clearTids() { tids.forEach(clearTimeout); tids = []; }

function startIntro() {
  clearTids();
  cancelAnimationFrame(rafId);

  const area = document.getElementById('stream-area');
  area.innerHTML = '';
  const els = [];
  WORDS.forEach((w, i) => {
    const s = document.createElement('span');
    s.className = 'sw' + (i >= WORDS.length - 2 ? ' highlight' : '');
    s.textContent = w;
    area.appendChild(s);
    els.push(s);
  });

  const lb = document.getElementById('logo-block');
  const dom = document.getElementById('domains');
  const tag = document.getElementById('tagline');
  const rt = document.getElementById('rule-top');
  const rb = document.getElementById('rule-bot');
  const corners = ['c-tl','c-tr','c-bl','c-br'].map(id => document.getElementById(id));
  const themeBtn = document.getElementById('theme-btn');
  const replayBtn = document.getElementById('replay-btn');
  const statusBar = document.getElementById('status-bar');

  lb.classList.remove('show');
  dom.classList.remove('show');
  tag.classList.remove('show');
  themeBtn.classList.remove('show');
  replayBtn.classList.remove('show');
  statusBar.classList.remove('show');
  rt.style.width = '0';
  rb.style.width = '0';
  corners.forEach(c => c.classList.remove('show'));
  document.getElementById('grid-overlay').classList.remove('on');

  initParticles();
  rafId = requestAnimationFrame(drawBg);

  const scan = document.getElementById('scan');
  let scanPos = 0;
  scan.style.opacity = '1';
  scan.style.top = '0';
  const scanAnim = () => {
    scanPos += 2.5;
    scan.style.top = scanPos + 'px';
    if (scanPos < H) requestAnimationFrame(scanAnim);
    else scan.style.opacity = '0';
  };
  tids.push(setTimeout(() => {
    document.getElementById('grid-overlay').classList.add('on');
    requestAnimationFrame(scanAnim);
  }, 200));

  let i = 0;
  const step = () => {
    if (i < els.length) {
      const el = els[i];
      el.classList.add('on');
      const ii = i;
      tids.push(setTimeout(() => {
        el.classList.add('glow');
        tids.push(setTimeout(() => {
          el.classList.remove('glow');
          el.classList.add('dim');
        }, 480));
      }, 60));
      i++;
      const isLast2 = i >= els.length - 1;
      tids.push(setTimeout(step, isLast2 ? 220 : 85));
    } else {
      tids.push(setTimeout(flashAll, 320));
    }
  };

  const flashAll = () => {
    els.forEach((el, idx) => {
      tids.push(setTimeout(() => {
        el.classList.remove('dim');
        el.classList.add('glow');
      }, idx * 28));
    });
    tids.push(setTimeout(() => {
      els.forEach(el => { el.classList.remove('glow'); el.classList.add('dim'); });
      showLogo();
    }, els.length * 28 + 600));
  };

  const showLogo = () => {
    lb.classList.add('show');
    tids.push(setTimeout(() => {
      rt.style.width = '220px';
      rb.style.width = '220px';
    }, 250));
    tids.push(setTimeout(() => { dom.classList.add('show'); }, 550));
    tids.push(setTimeout(() => { tag.classList.add('show'); }, 820));
    tids.push(setTimeout(() => { corners.forEach(c => c.classList.add('show')); }, 400));
    tids.push(setTimeout(() => {
      themeBtn.classList.add('show');
      replayBtn.classList.add('show');
      statusBar.classList.add('show');
      startDotPulse();
    }, 1100));
  };

  tids.push(setTimeout(step, 350));
}

let dotInterval;
function startDotPulse() {
  clearInterval(dotInterval);
  let on = true;
  dotInterval = setInterval(() => {
    const d = document.getElementById('logo-dot');
    if (d) d.style.opacity = on ? '1' : '0.15';
    on = !on;
  }, 950);
}

resize();
startIntro();
window.addEventListener('resize', () => { resize(); initParticles(); });
</script>
</body>
</html>
